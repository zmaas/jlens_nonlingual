<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">OthelloGPT median next-move rank by layer</title>
  <desc id="desc">Lower is better. J-lens improves from rank 20 at layer zero to rank 4 at layer six. Logit lens begins at rank 6 and reaches rank 4.</desc>
  <rect width="720" height="360" fill="#ffffff"/>
  <g font-family="system-ui, sans-serif" font-size="12" fill="#24292f">
    <text x="60" y="18" font-size="16" font-weight="600">Median next-move rank (lower is better)</text>
    <text x="370" y="344" text-anchor="middle">Source layer</text>
    <text transform="translate(16 165) rotate(-90)" text-anchor="middle">Median rank</text>
  </g>
  <g stroke="#d8dee4" stroke-width="1"><path d="M60 30H680 M60 95H680 M60 160H680 M60 225H680 M60 290H680"/></g>
  <g stroke="#57606a" stroke-width="1.2"><path d="M60 30V290H680" fill="none"/></g>
  <g font-family="system-ui, sans-serif" font-size="11" fill="#57606a">
    <text x="50" y="34" text-anchor="end">0</text><text x="50" y="99" text-anchor="end">5</text><text x="50" y="164" text-anchor="end">10</text><text x="50" y="229" text-anchor="end">15</text><text x="50" y="294" text-anchor="end">20</text>
    <text x="60" y="308" text-anchor="middle">0</text><text x="163" y="308" text-anchor="middle">1</text><text x="267" y="308" text-anchor="middle">2</text><text x="370" y="308" text-anchor="middle">3</text><text x="473" y="308" text-anchor="middle">4</text><text x="577" y="308" text-anchor="middle">5</text><text x="680" y="308" text-anchor="middle">6</text>
  </g>
  <path d="M60 290 L163 251 L267 212 L370 160 L473 121 L577 95 L680 82" fill="none" stroke="#0969da" stroke-width="3"/>
  <path d="M60 108 L163 95 L267 95 L370 95 L473 82 L577 82 L680 82" fill="none" stroke="#bf3989" stroke-width="3"/>
  <path d="M60 82H680" fill="none" stroke="#57606a" stroke-width="2" stroke-dasharray="7 5"/>
  <g fill="#0969da"><circle cx="60" cy="290" r="4"/><circle cx="163" cy="251" r="4"/><circle cx="267" cy="212" r="4"/><circle cx="370" cy="160" r="4"/><circle cx="473" cy="121" r="4"/><circle cx="577" cy="95" r="4"/><circle cx="680" cy="82" r="4"/></g>
  <g fill="#bf3989"><rect x="56" y="104" width="8" height="8"/><rect x="159" y="91" width="8" height="8"/><rect x="263" y="91" width="8" height="8"/><rect x="366" y="91" width="8" height="8"/><rect x="469" y="78" width="8" height="8"/><rect x="573" y="78" width="8" height="8"/><rect x="676" y="78" width="8" height="8"/></g>
  <g font-family="system-ui, sans-serif" font-size="11" fill="#24292f">
    <line x1="82" y1="42" x2="108" y2="42" stroke="#0969da" stroke-width="3"/><circle cx="95" cy="42" r="4" fill="#0969da"/><text x="114" y="46">J-lens</text>
    <line x1="180" y1="42" x2="206" y2="42" stroke="#bf3989" stroke-width="3"/><rect x="189" y="38" width="8" height="8" fill="#bf3989"/><text x="212" y="46">Logit lens</text>
    <line x1="300" y1="42" x2="326" y2="42" stroke="#57606a" stroke-width="2" stroke-dasharray="7 5"/><text x="332" y="46">Final logits (rank 4)</text>
  </g>
</svg>
